<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
    <section class="hero-card">
        <div class="hero-content">
            <div class="eyebrow">✨ ATTENDANCE SYSTEM</div>
            <h1 class="hero-title">欢迎回来</h1>
            <p class="hero-desc">登录班级考勤管理系统，继续管理学生与考勤数据。</p>
        </div>
    </section>

    <section class="panel">
        <p th:if="${errorMsg}" th:text="${errorMsg}" class="error"></p>
        <p th:if="${successMsg}" th:text="${successMsg}" class="success"></p>

        <form action="/page/login" method="post">
            <div class="form-grid">
                <div class="form-group full">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required>
                </div>

                <div class="form-group full">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>
            </div>

            <div class="btn-row">
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </div>
        </form>

        <div class="link">
            没有账号？<a href="/register">去注册</a>
        </div>
    </section>
</div>
</body>
</html>
