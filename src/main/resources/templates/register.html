<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
    <section class="hero-card">
        <div class="hero-content">
            <div class="eyebrow">✨ CREATE ACCOUNT</div>
            <h1 class="hero-title">创建账号</h1>
            <p class="hero-desc">填写基础信息，快速加入班级考勤管理系统。</p>
        </div>
    </section>

    <section class="panel">
        <p th:if="${errorMsg}" th:text="${errorMsg}" class="error"></p>

        <form action="/page/register" method="post">
            <div class="form-grid">
                <div class="form-group full">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required>
                </div>

                <div class="form-group full">
                    <label>真实姓名</label>
                    <input type="text" name="realName" placeholder="请输入真实姓名" required>
                </div>

                <div class="form-group full">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>

                <div class="form-group full">
                    <label>确认密码</label>
                    <input type="password" name="confirmPassword" placeholder="请再次输入密码" required>
                </div>

                <div class="form-group full">
                    <label>角色</label>
                    <select name="role">
                        <option value="STUDENT">学生</option>
                        <option value="TEACHER">教师</option>
                    </select>
                </div>
            </div>

            <div class="btn-row">
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </div>
        </form>

        <div class="link">
            已有账号？<a href="/login">去登录</a>
        </div>
    </section>
</div>
</body>
</html>
